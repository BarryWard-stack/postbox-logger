<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Heritage Postbox v0.9.1 (Alpha)</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    
    <!-- Load dependencies synchronously BEFORE app starts -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <script src="postboxAssets.js"></script>
    <script src="postcard-engine.js"></script>
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }
        #root { 
            height: 100vh; 
            width: 100vw;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* Mobile optimizations */
        button, a, input, select, textarea {
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        
        /* Prevent iOS zoom on focus */
        input, select, textarea {
            font-size: 16px !important;
        }
        
        /* Pulsating user location marker */
        .user-location-marker {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            position: relative;
        }
        .user-location-marker::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            animation: pulsate 2s infinite;
        }
        @keyframes pulsate {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7ru5fPR4LRpnVfb9ImBEs6kf8-mQ5l54",
            authDomain: "heritage-postbox.firebaseapp.com",
            projectId: "heritage-postbox",
            storageBucket: "heritage-postbox.firebasestorage.app",
            messagingSenderId: "805684480299",
            appId: "1:805684480299:web:2deb544ac5c7f87a93dd6e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Make available globally
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseSignInAnonymously = signInAnonymously;
        window.firebaseOnAuthStateChanged = onAuthStateChanged;
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseQuery = query;
        window.firebaseOrderBy = orderBy;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseDoc = doc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseServerTimestamp = serverTimestamp;

        // Auto sign in anonymously
        signInAnonymously(auth).catch(error => console.error("Auth error:", error));

        
        </script>
    <script src="plogger.js"></script>
</body>
